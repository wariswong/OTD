<!DOCTYPE html>
<html lang="th">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>เข้าสู่ระบบ | GIS OTD</title>
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        primary: {
                            DEFAULT: '#7e468f',
                            dark: '#690089',
                        }
                    },
                    fontFamily: {
                        sans: ['Prompt', 'Inter', 'sans-serif'],
                    },
                }
            }
        }
    </script>
    
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&family=Prompt:wght@400;600;700&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css" rel="stylesheet">

    <style>
        .bg-login {
            background: linear-gradient(135deg, #690089 0%, #7e468f 100%);
        }
        .glass {
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.3);
        }
    </style>
</head>

<body class="bg-login font-sans min-h-screen flex items-center justify-center p-4">
    <div class="glass w-full max-w-md rounded-3xl shadow-2xl overflow-hidden animate-fade-in">
        <div class="p-8 text-center bg-white/50 border-b border-gray-100">
            <div class="inline-flex items-center justify-center w-20 h-20 rounded-2xl bg-primary text-white mb-6 shadow-lg shadow-primary/30">
                <i class="bi bi-geo-alt-fill text-4xl"></i>
            </div>
            <h1 class="text-3xl font-bold text-gray-800 tracking-tight">GIS OTD</h1>
            <p class="text-gray-500 mt-2">Optimal Transformer Deployment</p>
        </div>
        
        <div class="p-10">
            <div class="mb-8">
                <h2 class="text-xl font-semibold text-gray-800 text-center">เข้าสู่ระบบ</h2>
                <p class="text-sm text-gray-500 text-center mt-1">กรุณาเข้าสู่ระบบด้วย PEA SSO เพื่อใช้งาน</p>
            </div>
            
            <a href="/login" class="flex items-center justify-center space-x-3 w-full bg-primary hover:bg-primary-dark text-white font-bold py-4 rounded-2xl shadow-xl shadow-primary/20 transition-all duration-300 transform hover:-translate-y-1 active:scale-95">
                <i class="bi bi-shield-lock-fill text-xl"></i>
                <span>เข้าสู่ระบบผ่าน SSO</span>
            </a>
            
            <p class="text-xs text-center text-gray-400 mt-8">
                © 2024 Provincial Electricity Authority (PEA)
            </p>
        </div>
    </div>

</html>
